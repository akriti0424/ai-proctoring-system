<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Proctoring System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <h2>AI Proctoring System</h2>
        <p>Please log in to start your exam</p>
        <form id="login-form" action="/pages/exam.html">
            <div class="form-group">
                <label for="student_id">Student ID</label>
                <input type="text" id="student_id" name="student_id" required placeholder="Enter your Student ID">
            </div>
            <div class="form-group">
                <label for="exam_code">Exam Code</label>
                <input type="password" id="exam_code" name="exam_code" required placeholder="Enter your Exam Code">
            </div>
            <button type="submit" class="btn-primary">Start Exam</button>
        </form>
    </div>
</body>
</html>
