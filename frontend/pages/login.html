<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Proctoring - Student Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        .login-container h2 { margin-bottom: 20px; }
        .login-container input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .login-container button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .login-container button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Student Login</h2>
    <input type="text" id="username" placeholder="Username (any)" required>
    <input type="password" id="password" placeholder="Password (any)" required>
    <input type="text" id="course_code" placeholder="Course Code (e.g., CS101)" value="CS101" required>
    <button onclick="startExam()">Login to Exam</button>
</div>

<script>
    async function startExam() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const course_code = document.getElementById("course_code").value;

        if (username === "" || password === "") {
            alert("Please enter username and password");
            return;
        }

        let response = await fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password,
                course_code: course_code
            })
        });

        let data = await response.json();

        if (data.status === "success") {
            // Save mock token/user to local storage
            localStorage.setItem("student_id", username);
            alert("Login Successful!");
            setTimeout(() => {
                window.location.href = "/exam";
            }, 500);
        } else {
            alert("Invalid Username or Password");
        }
    }
</script>

</body>
</html>
